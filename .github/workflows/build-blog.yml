name: Build blog

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".eleventy.js"
      - "package.json"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-blog
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build blog
        run: npm run build

      - name: Commit generated blog
        run: |
          git config user.name "mds-blog-bot"
          git config user.email "actions@github.com"
          git add insights
          if git diff --staged --quiet; then
            echo "No blog changes to commit."
          else
            git commit -m "Build blog [skip ci]"
            git push
          fi
