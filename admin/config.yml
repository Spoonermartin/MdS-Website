# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: Spoonermartin/MdS-Website
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/a79624c4-ea2a-405f-bd4b-236b159d89c1/pkce
  auth_token_endpoint: /sites/a79624c4-ea2a-405f-bd4b-236b159d89c1/token
  gateway_url: https://gateway.decapbridge.com
  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://mdswebsites.co.uk
display_url: https://mdswebsites.co.uk

# Where uploaded blog images are stored (committed to the repo, served by Hostinger)
media_folder: "assets/blog"
public_folder: "/assets/blog"

collections:
  - name: blog
    label: Blog Posts
    label_singular: Blog Post
    description: "Add or edit articles for the /blog section."
    folder: "src/posts"
    create: true
    slug: "{{slug}}"
    preview_path: "blog/{{slug}}"
    sortable_fields: [date, title]
    fields:
      - { label: Title, name: title, widget: string, hint: "Shown as the main headline and the browser tab title." }
      - { label: "Meta description (for Google)", name: description, widget: text, hint: "1–2 sentences. This is what shows under the title in search results." }
      - { label: "Lead / intro paragraph", name: lead, widget: text, hint: "The large intro line under the headline." }
      - { label: "Category tag", name: tag, widget: string, default: "Insights", hint: "e.g. Local SEO, Branding, Web Design." }
      - { label: "Read time", name: readtime, widget: string, default: "5 min read", required: false }
      - { label: "Publish date", name: date, widget: datetime, date_format: "DD MMM YYYY", time_format: false, format: "YYYY-MM-DD" }
      - { label: "Cover image (optional)", name: image, widget: image, required: false, hint: "Optional image shown at the top of the article." }
      - { label: "Article body", name: body, widget: markdown }
